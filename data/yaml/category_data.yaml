# ============================================================
# Lot & Haul — Item Data Authoring Example
# dev/tools/data_source/oil_lamp_items.yaml
#
# Pipeline: this file → init_db.py → lot_haul.db → export_tres.py → .tres
#
# Seed order: categories → identity_layers → items
# ============================================================

# ────────────────────────────────────────────────────────────
# CATEGORIES
# One entry per fine-grained physical type.
# All items sharing the same category_id point to this record.
# ────────────────────────────────────────────────────────────
# categories:

#   - category_id: oil_lamp          # snake_case, unique, matches .tres filename stem
#     super_category: decorative     # snake_case id of super-category
#     display_name: Oil Lamp         # Fine-grained label shown to player
#     weight: 3.0                    # kilograms (float)
#     shape_id: s1x2                 # cargo shape key. See CargoShapes.SHAPES.

super_categories:
  - super_category_id: fashion
    display_name: Fashion
    restore_skill: textile_care
    market_mean_min: 0.7
    market_mean_max: 1.3
    market_stddev: 0.02
    market_drift_per_week: 0.05

  - super_category_id: decorative
    display_name: Decorative
    restore_skill: conservation
    market_mean_min: 0.7
    market_mean_max: 1.3
    market_stddev: 0.02
    market_drift_per_week: 0.05

  - super_category_id: fine_art
    display_name: Fine Art
    restore_skill: art_restoration
    market_mean_min: 0.7
    market_mean_max: 1.3
    market_stddev: 0.02
    market_drift_per_week: 0.05

  - super_category_id: weapon
    display_name: Weapon
    restore_skill: gunsmithing
    market_mean_min: 0.7
    market_mean_max: 1.3
    market_stddev: 0.02
    market_drift_per_week: 0.05

categories:
  # ── Fashion (2) ───────────────────────────────────────
  - category_id: handbag
    super_category: fashion
    display_name: Handbag
    weight: 0.5
    shape_id: s1x2

  - category_id: wristwatch
    super_category: fashion
    display_name: Wristwatch
    weight: 0.1
    shape_id: s1x1

  # ── Decorative (5) ────────────────────────────────────
  - category_id: oil_lamp
    super_category: decorative
    display_name: Oil Lamp
    weight: 3.0
    shape_id: s1x2

  - category_id: clock
    super_category: decorative
    display_name: Clock
    weight: 4.0
    shape_id: s1x3

  - category_id: porcelain_figurine
    super_category: decorative
    display_name: Porcelain Figurine
    weight: 0.8
    shape_id: s1x1

  - category_id: vase
    super_category: decorative
    display_name: Vase
    weight: 2.0
    shape_id: s1x2

  - category_id: poster
    super_category: decorative
    display_name: Poster
    weight: 0.2
    shape_id: s1x3

  # ── Fine Art (2) ──────────────────────────────────────
  - category_id: painting
    super_category: fine_art
    display_name: Painting
    weight: 1.5
    shape_id: s1x3

  - category_id: sculpture
    super_category: fine_art
    display_name: Sculpture
    weight: 8.0
    shape_id: s1x3

  # ── Weapon (3) ────────────────────────────────────────
  - category_id: pistol
    super_category: weapon
    display_name: Pistol
    weight: 1.2
    shape_id: sL11

  - category_id: rifle
    super_category: weapon
    display_name: Rifle
    weight: 4.5
    shape_id: sL12

  - category_id: crossbow
    super_category: weapon
    display_name: Crossbow
    weight: 3.5
    shape_id: sT3
