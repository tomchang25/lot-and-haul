merchants:
  - merchant_id: pawn_shop
    display_name: Pawn Shop
    description: "Buys anything, but at below-market rates."
    accepted_super_categories: []
    price_multiplier: 1.0
    accepts_off_category: true
    off_category_multiplier: 0.7
    ceiling_multiplier_min: 1.1
    ceiling_multiplier_max: 1.3
    anger_max: 100.0
    anger_k: 20.0
    anger_per_round: 20.0
    counter_aggressiveness: 0.3
    auto_accept_threshold: 0.2
    auto_accept_p_min: 0.01
    negotiation_per_day: 1
    special_orders: []
    order_roll_cadence: 0
    max_active_orders: 0
    required_perk_id: ""

  - merchant_id: antique_dealer
    display_name: Antique Dealer
    description: "Specialist in decorative antiques. Pays premium for quality pieces."
    accepted_super_categories: [decorative]
    price_multiplier: 1.3
    accepts_off_category: false
    off_category_multiplier: 0.0
    ceiling_multiplier_min: 1.2
    ceiling_multiplier_max: 1.5
    anger_max: 80.0
    anger_k: 25.0
    anger_per_round: 25.0
    counter_aggressiveness: 0.4
    auto_accept_threshold: 0.15
    auto_accept_p_min: 0.02
    negotiation_per_day: 1
    special_orders: [antique_dealer_premium, antique_dealer_bulk]
    order_roll_cadence: 3
    max_active_orders: 2
    required_perk_id: ""
