items:
  # ── Pistol items ───────────────────────────────────────
  # All share pistol_veil + pistol_body (layers 0–1).
  # Items 2+3 share pistol_proofmark (deep trunk at layer 2).
  # Item 4 diverges at layer 2 via pistol_carved_grip.

  - item_id: pistol_dutch_holster
    category_id: pistol
    rarity: 1
    layer_ids:
      - pistol_veil
      - pistol_body
      - pistol_leaf_dutch

  - item_id: pistol_british_naval
    category_id: pistol
    rarity: 2
    layer_ids:
      - pistol_veil
      - pistol_body
      - pistol_proofmark
      - pistol_leaf_naval

  - item_id: pistol_french_cavalry
    category_id: pistol
    rarity: 3
    layer_ids:
      - pistol_veil
      - pistol_body
      - pistol_proofmark
      - pistol_arsenal_stamp
      - pistol_leaf_cavalry

  - item_id: pistol_boutet_versailles
    category_id: pistol
    rarity: 4
    layer_ids:
      - pistol_veil
      - pistol_body
      - pistol_carved_grip
      - pistol_maker_mark
      - pistol_leaf_boutet

  # ── Rifle items ────────────────────────────────────────
  # All share rifle_veil + rifle_body (layers 0–1).
  # Items 2+3 share rifle_military_proof (deep trunk at layer 2).
  # Item 4 diverges at layer 2 via rifle_engraved_action.

  - item_id: rifle_charleville_repro
    category_id: rifle
    rarity: 1
    layer_ids:
      - rifle_veil
      - rifle_body
      - rifle_leaf_charleville

  - item_id: rifle_springfield_1861
    category_id: rifle
    rarity: 2
    layer_ids:
      - rifle_veil
      - rifle_body
      - rifle_military_proof
      - rifle_leaf_springfield

  - item_id: rifle_crimea_enfield
    category_id: rifle
    rarity: 3
    layer_ids:
      - rifle_veil
      - rifle_body
      - rifle_military_proof
      - rifle_regiment_mark
      - rifle_leaf_regiment

  - item_id: rifle_whitworth_sniper
    category_id: rifle
    rarity: 4
    layer_ids:
      - rifle_veil
      - rifle_body
      - rifle_engraved_action
      - rifle_maker_signed
      - rifle_leaf_whitworth

  # ── Crossbow items ─────────────────────────────────────
  # All share crossbow_veil + crossbow_body (layers 0–1).
  # Items 1+2 diverge immediately at layer 2 (standard fork to leaf).
  # Items 3+4 share crossbow_mechanism (layer 2), then fork.

  - item_id: crossbow_german_hunting
    category_id: crossbow
    rarity: 1
    layer_ids:
      - crossbow_veil
      - crossbow_body
      - crossbow_leaf_hunting

  - item_id: crossbow_swiss_military
    category_id: crossbow
    rarity: 2
    layer_ids:
      - crossbow_veil
      - crossbow_body
      - crossbow_mechanism
      - crossbow_leaf_military

  - item_id: crossbow_noble_presentation
    category_id: crossbow
    rarity: 3
    layer_ids:
      - crossbow_veil
      - crossbow_body
      - crossbow_mechanism
      - crossbow_provenance
      - crossbow_leaf_noble
