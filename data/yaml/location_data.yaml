# ============================================================
# Lot & Haul — Location & Lot Data Authoring
# data/yaml/location_data.yaml
#
# Pipeline: this file → yaml_to_tres.py → data/tres/lots/*.tres
#                                        + data/tres/locations/*.tres
#
# Lots define per-auction properties (NPC aggression, item pool
# weights, pricing).  Locations reference lots via lot_pool and
# set travel / entry parameters.
#
# Dependency order: lots are exported before locations because
# each location's lot_pool references lot .tres files.
# ============================================================

lots:
  # ── Beginner lots — low aggression, common items ───────────
  - lot_id: beginner_mixed_a
    aggressive_factor_min: 0.2
    aggressive_factor_max: 0.5
    aggressive_lerp_min: 0.7
    aggressive_lerp_max: 1.05
    npc_layer_sight_chance: 0.3
    opening_bid_factor: 0.2
    veiled_chance: 0.3
    item_count_min: 3
    item_count_max: 5
    rarity_weights: { 0: 60, 1: 25, 2: 10, 3: 4, 4: 1 }
    super_category_weights: {}
    category_weights: { handbag: 2, wristwatch: 1, oil_lamp: 2, mantel_clock: 1 }
    price_floor_factor: 0.6
    price_ceiling_factor: 1.3
    price_variance_min: 0.9
    price_variance_max: 1.1
    action_quota: 6

