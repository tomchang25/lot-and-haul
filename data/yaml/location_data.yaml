locations:
  # ── Starter location — cheap, short trip, forgiving lots ───
  - location_id: suburban_storage
    display_name: Suburban Storage
    description: A quiet self-storage facility on the outskirts of town.
    entry_fee: 50
    travel_days: 1
    lot_number: 3
    lot_pool:
      - beginner_mixed_a
      - beginner_mixed_b
      - beginner_mixed_c

  # ── Mid-tier location — costlier, longer trip, better lots ─
  - location_id: midtown_warehouse
    display_name: Midtown Warehouse
    description: A large commercial warehouse with higher-quality inventory.
    entry_fee: 200
    travel_days: 2
    lot_number: 3
    lot_pool:
      - midtown_weapons
      - midtown_decor
      - midtown_mixed
      - beginner_mixed_a
